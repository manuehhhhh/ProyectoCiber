<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SoyUCAB - Subir Recurso</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/upload-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="contenedor_principal">
        
        <aside class="barra_lateral_izquierda">
            <div class="logo_app">
                <img src="img/avatar_placeholder.png" alt="Logo" style="width: 50px; border-radius: 5px;">
            </div>
            
            <nav class="menu_navegacion">
                <a href="index.html" class="item_menu">
                    <i class="fa-solid fa-house"></i> Inicio
                </a>
                <div class="separador_menu"></div>
                <a href="#" class="item_menu">
                    <i class="fa-solid fa-book"></i> Recursos
                </a>
                <a href="#" class="item_menu activo">
                    <i class="fa-solid fa-upload"></i> Subir Recurso
                </a>
            </nav>
        </aside>

        <main class="columna_central">
            <div class="upload-container">
                <div class="upload-header">
                    <h2>Subir Nuevo Recurso Educativo</h2>
                    <p>Comparte materiales útiles con la comunidad</p>
                </div>
                
                <div class="upload-form">
                    <div class="form-section">
                        <label for="file-upload-input" class="form-label">1. Selecciona el archivo</label>
                        <div id="file-drop-zone" class="file-drop-zone">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <p>Arrastra y suelta tu archivo aquí, o <strong>haz clic para seleccionar</strong></p>
                            <span id="file-name-display" class="file-name-display"></span>
                        </div>
                        <input type="file" id="file-upload-input" hidden>
                    </div>

                    <div class="form-section">
                        <label for="resource-name" class="form-label">2. Dale un nombre a tu recurso</label>
                        <input type="text" id="resource-name" class="form-input" placeholder="Ej: Guía de estudio para Cálculo II">
                    </div>

                    <div class="form-section">
                        <label for="resource-description" class="form-label">3. Agrega una descripción (opcional)</label>
                        <textarea id="resource-description" class="form-input" rows="4" placeholder="Ej: Resumen completo para el examen final de Cálculo II, incluye ejercicios resueltos y tips."></textarea>
                    </div>

                    <div class="form-section">
                        <label class="form-label">4. ¿Para qué carreras es útil?</label>
                        <div id="carreras-checkbox-container" class="checkbox-grid">
                            <!-- Las carreras se cargarán aquí dinámicamente -->
                            <p>Cargando carreras...</p>
                        </div>
                    </div>

                    <div class="form-section">
                        <label class="form-label">4. ¿En qué idioma está?</label>
                        <div id="idiomas-checkbox-container" class="checkbox-group">
                            <!-- Los idiomas se cargarán aquí dinámicamente -->
                            <p>Cargando idiomas...</p>
                        </div>
                    </div>

                    <div class="upload-actions">
                        <button class="boton_publicar">
                            <i class="fa-solid fa-paper-plane"></i> Publicar Recurso
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <aside class="barra_lateral_derecha">
            <div class="header_perfil">
                <div id="info-usuario-logueado" class="info_usuario_top">
                    <img src="img/avatar_placeholder.png" class="avatar_top">
                    <div class="textos_top">
                        <span class="nombre_top">Manuel</span>
                        <span class="usuario_top">@manuel</span>
                    </div>
                </div>
                <div class="contenedor_dropdown">
                    <i class="fa-solid fa-chevron-down flecha_menu"></i>
                </div>
            </div>
            <h3 class="titulo_seccion">Mis Contribuciones</h3>
            <!-- Aquí podrían ir los archivos subidos por el usuario -->
        </aside>

    </div>

    <script src="js/upload.js"></script>
</body>
</html>
