</div>     <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">

                <div class="text-2xl font-black text-gray-800" id="miembros-val">0</div>
                <div class="text-[10px] text-gray-400 uppercase font-bold">Capacidad Actual</div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                <div class="text-purple-400 mb-2 text-2xl"><i class="fas fa-file-alt"></i></div>
                <div class="text-2xl font-black text-gray-800">12+</div>
                <div class="text-[10px] text-gray-400 uppercase font-bold">Recursos Compartidos</div>
            </div>
        </div>
    </div>

    <script>
        // Simulamos obtener el ID de la URL (ej: grupo.html?id=5)
        const urlParams = new URLSearchParams(window.location.search);
        const grupoId = urlParams.get('id') || 1; 

        async function cargarInfoGrupo() {
            try {
                // Consultamos a tu API de Sequelize
                const response = await fetch(`api/grupo/${grupoId}`);
                const g = await response.json();

                // Llenar datos en el HTML
                document.getElementById('id-display').innerText = g.id_grupo;
                document.getElementById('miembros-display').innerText = g.cantidad_miembro;
                document.getElementById('miembros-val').innerText = g.cantidad_miembro;
                document.getElementById('descripcion-display').innerText = g.descripcion_grupo || "Esta comunidad aún no cuenta con una descripción detallada.";
                document.getElementById('tipo-val').innerText = g.tipo_grupo;

                // Estilo del badge según tipo
                const badge = document.getElementById('badge-tipo');
                badge.innerText = g.tipo_grupo;
                if(g.tipo_grupo === 'Publico') {
                    badge.classList.add('bg-green-50', 'text-green-600', 'border-green-200');
                } else if(g.tipo_grupo === 'Privado') {
                    badge.classList.add('bg-amber-50', 'text-amber-600', 'border-amber-200');
                } else {
                    badge.classList.add('bg-red-50', 'text-red-600', 'border-red-200');
                }

            } catch (error) {
                console.error("Error cargando el grupo:", error);
                document.getElementById('descripcion-display').innerHTML = 
                    "<span class='text-red-400'>No se pudo conectar con el servidor para obtener los detalles.</span>";
            }
        }

        document.addEventListener('DOMContentLoaded', cargarInfoGrupo);
    </script>
