<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Académicos | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-active { background-color: rgba(255, 255, 255, 0.2); border-left: 4px solid white; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#6ca6e0] text-white hidden md:flex flex-col shadow-xl">
            <div class="p-6 text-center border-b border-blue-300">
                <h2 class="text-2xl font-bold tracking-wider">RED ACADÉMICA</h2>
            </div>
            <nav class="flex-grow mt-6">
                <a href="#" class="flex items-center px-6 py-3 text-gray-100 hover:bg-white/10 transition-all">
                    <i class="fas fa-home w-6"></i> <span>Inicio</span>
                </a>
                <a href="#" class="flex items-center px-6 py-3 sidebar-active text-white">
                    <i class="fas fa-folder-open w-6"></i> <span>Recursos</span>
                </a>
                <a href="#" class="flex items-center px-6 py-3 text-gray-100 hover:bg-white/10 transition-all">
                    <i class="fas fa-graduation-cap w-6"></i> <span>Carreras</span>
                </a>
                <a href="#" class="flex items-center px-6 py-3 text-gray-100 hover:bg-white/10 transition-all">
                    <i class="fas fa-users w-6"></i> <span>Miembros</span>
                </a>
            </nav>
            <div class="p-6 border-t border-blue-300 text-sm">
                <p class="opacity-75 text-center">Base de Datos v2.0</p>
            </div>
        </aside>

        <main class="flex-grow flex flex-col">
            
            <header class="bg-white h-16 shadow-sm flex items-center justify-between px-8">
                <div class="flex items-center bg-gray-100 px-4 py-2 rounded-full w-96 border border-gray-200">
                    <i class="fas fa-search text-gray-400"></i>
                    <input type="text" placeholder="Buscar recurso..." class="bg-transparent ml-3 outline-none text-sm w-full">
                </div>
                <div class="flex items-center gap-4">
                    <i class="fas fa-bell text-gray-400 cursor-pointer"></i>
                    <div class="w-8 h-8 rounded-full bg-[#4fc1e9] flex items-center justify-center text-white font-bold">M</div>
                    <span class="text-sm font-medium text-gray-700">Miguel</span>
                </div>
            </header>

            <div class="p-8">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Repositorio de Recursos</h1>
                        <nav class="text-sm text-gray-500 flex gap-2">
                            <span class="hover:underline cursor-pointer">Dashboard</span> 
                            <span>/</span> 
                            <span class="text-blue-500 font-semibold">Recursos</span>
                        </nav>
                    </div>
                    <button class="bg-[#4fc1e9] hover:bg-[#357ebd] text-white px-6 py-2 rounded-lg shadow-lg font-semibold flex items-center gap-2 transition-all">
                        <i class="fas fa-plus"></i> Añadir Recurso
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-bold tracking-widest border-b">
                            <tr>
                                <th class="px-6 py-4">ID</th>
                                <th class="px-6 py-4">Nombre del Recurso</th>
                                <th class="px-6 py-4">Usuario</th>
                                <th class="px-6 py-4">Descripción</th>
                                <th class="px-6 py-4">Fecha</th>
                                <th class="px-6 py-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-recursos" class="divide-y divide-gray-100 text-sm">
                            <tr>
                                <td colspan="6" class="px-6 py-12 text-center text-gray-400 italic">
                                    <i class="fas fa-sync-alt animate-spin mr-2"></i> Conectando con servidor...
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="p-6 flex justify-between items-center border-t">
                        <p class="text-sm text-gray-500" id="contador-recursos">Mostrando 0 recursos</p>
                        <div class="flex gap-1">
                            <button class="px-3 py-1 border rounded hover:bg-gray-50 transition"><i class="fas fa-chevron-left text-xs"></i></button>
                            <button class="px-3 py-1 bg-blue-500 text-white rounded">1</button>
                            <button class="px-3 py-1 border rounded hover:bg-gray-50 transition"><i class="fas fa-chevron-right text-xs"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "http://localhost:8000/api/recurso/";

        async function cargarDatos() {
            const tbody = document.getElementById('tabla-recursos');
            const contador = document.getElementById('contador-recursos');

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                tbody.innerHTML = "";
                data.forEach(r => {
                    const fechaFmt = new Date(r.fecha_cargado).toLocaleDateString();
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 font-bold text-gray-400">#${r.id_recurso}</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-blue-50 text-blue-500 rounded-lg"><i class="fas fa-file-pdf"></i></div>
                                    <span class="font-bold text-gray-700">${r.nombre_recurso}</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-gray-600">
                                <span class="bg-gray-100 px-2 py-1 rounded-full text-xs font-semibold uppercase">Miembro #${r.id_usuario_comparte}</span>
                            </td>
                            <td class="px-6 py-4 text-gray-500 max-w-xs truncate">${r.descripcion_recurso || '...'}</td>
                            <td class="px-6 py-4 text-gray-400 text-xs font-medium">${fechaFmt}</td>
                            <td class="px-6 py-4">
                                <div class="flex justify-center gap-4">
                                    <button class="text-blue-400 hover:text-blue-600"><i class="fas fa-eye"></i></button>
                                    <button onclick="eliminar(${r.id_recurso})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                contador.innerText = `Mostrando ${data.length} registros`;
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-red-400">Error de conexión con la API en puerto 8000</td></tr>`;
            }
        }

        async function eliminar(id) {
            if (!confirm("¿Estás seguro de que quieres eliminar este recurso?")) return;
            
            try {
                const response = await fetch(`${API_URL}${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert("Recurso eliminado exitosamente");
                    cargarDatos(); // Recargar la tabla
                } else {
                    throw new Error("Error al eliminar el recurso");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Error al eliminar el recurso: " + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', cargarDatos);
    </script>
</body>
</html>
