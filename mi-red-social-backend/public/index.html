<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SoyUCAB - Inicio</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="contenedor_principal">
        
        <div class="barra_lateral_izquierda">
            <div class="logo_app">
        <img src="img/logo_soyucab.png" alt="SoyUCAB" class="imagen_logo_sidebar">
    </div>
            
            <nav class="menu_navegacion">
                <a href="#" class="item_menu activo">
                    <i class="fa-solid fa-house"></i> Inicio
                </a>
                <div class="separador_menu"></div>
                <a href="#" class="item_menu">
                    <i class="fa-solid fa-users"></i> Grupos Suscritos
                </a>
                <a href="#" class="item_menu">
                    <i class="fa-solid fa-bullhorn"></i> Eventos Suscritos
                </a>
            </nav>
        </div>

        <main class="columna_central">
            
            <div class="contenedor_busqueda">
                <i class="fa-solid fa-magnifying-glass icono_busqueda"></i>
                
                <input type="text" id="input-busqueda-global" class="input_busqueda" placeholder="Buscar..." autocomplete="off">
                
                <div id="lista-resultados-busqueda" class="dropdown_resultados oculto"></div>
            </div>

            <div class="caja_crear_publicacion">
                <div class="cabecera_azul">
                    Publica algo...
                </div>
                <div class="cuerpo_publicar">
                    <div class="input_con_icono">
                        <i class="fa-regular fa-circle-user icono_usuario_post"></i>
                        <textarea id="txt-publicacion" rows="2" placeholder="Comparte tus ideas"></textarea>
                    </div>
                    
                    <div class="pie_publicar">
                        <i class="fa-regular fa-image icono_camara" id="btn-select-imagen-post" style="cursor: pointer;"></i>
                        <input type="file" id="input-imagen-post" accept="image/*" style="display: none;">
                        
                        <div id="preview-imagen-post" style="display: none; margin-left: 10px; align-items: center;">
                            <img src="" style="max-height: 40px; border-radius: 4px;">
                            <i class="fa-solid fa-xmark" id="btn-borrar-preview" style="cursor:pointer; color:red; margin-left:5px;" title="Quitar imagen"></i>
                        </div>

                        <div class="acciones_derecha">
                            <span id="contador-caracteres" class="contador">200</span>
                            <button class="boton_publicar">Publicar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="barra_pestanas">
                <button class="pestana activo">Publicaciones</button>
                <button class="pestana">Grupos</button>
                <button class="pestana">Eventos</button>
                <button class="pestana">Networking</button>
                <button class="pestana">Recursos</button>
            </div>

            <div id="lista-publicaciones" class="feed_publicaciones">
                <p style="text-align:center; padding: 20px; color: #777;">Cargando...</p>
            </div>
        </main>

        <aside class="barra_lateral_derecha">
            <div class="header_perfil">
                <div id="info-usuario-logueado" class="info_usuario_top">
                    <img src="img/avatar_placeholder.png" class="avatar_top">
                    <div class="textos_top">
                        <span class="nombre_top">Cargando...</span>
                        <span class="usuario_top">...</span>
                    </div>
                </div>
                <div class="contenedor_dropdown">
                    <i class="fa-solid fa-chevron-down flecha_menu" id="btn-dropdown"></i>
                    <div id="menu-dropdown" class="menu_flotante oculto">
                        <a href="#"><i class="fa-solid fa-gear"></i> Ajustes</a>
                        <a href="#" style="color: red;"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
                    </div>
                </div>
            </div>
            <h3 class="titulo_seccion">Notificaciones</h3>
        </aside>

    </div>

    <div id="modal-comentarios" class="modal_overlay oculto">
        <div class="modal_contenido">
            <div class="modal_header">
                <h3>Comentarios</h3>
                <button id="btn-cerrar-modal" class="btn_cerrar">&times;</button>
            </div>
            <div id="lista-comentarios-modal" class="modal_body">
                <p class="cargando-texto">Cargando...</p>
            </div>
            <div class="modal_footer">
                <input type="text" id="input-nuevo-comentario" placeholder="Escribe un comentario..." autocomplete="off">
                <span id="contador-comentario" style="color: #4fc1e9; font-weight: bold; font-size: 0.8rem; margin-right: 10px;">200</span>
                <button id="btn-enviar-comentario" class="boton_publicar">Enviar</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
