<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Red Social Universitaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-container">
        <div class="header">
            <h1>Bienvenido de nuevo</h1>
            <p>Ingresa a la red social de tu universidad</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" class="form-control" placeholder="Ej. jperez123" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login" id="submitBtn">
                <span class="btn-text">Iniciar Sesión</span>
                <div class="spinner"></div>
            </button>
        </form>

        <div class="footer">
            ¿No tienes una cuenta? <a href="#">Regístrate aquí</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMessage');

            if (!username || !password) {
                showError('Por favor, completa todos los campos.');
                return;
            }

            // Set loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            errorMsg.classList.remove('show');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nombre_usuario: username,
                        clave: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success! Save user info and redirect
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    
                    // Add a nice success transition before redirecting
                    submitBtn.classList.remove('loading');
                    submitBtn.style.backgroundColor = '#10b981';
                    submitBtn.style.boxShadow = '0 4px 12px rgba(16, 185, 129, 0.4)';
                    submitBtn.querySelector('.btn-text').textContent = '¡Éxito!';
                    submitBtn.querySelector('.btn-text').style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/index.html'; // Redirige al feed/inicio
                    }, 800);
                } else {
                    showError(data.error || 'Ocurrió un error al iniciar sesión.');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Error de conexión. Inténtalo más tarde.');
            } finally {
                if (!submitBtn.style.backgroundColor) { // Solo restaurar si no fue exitoso
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            }
        });

        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            
            // Shake effect on the container
            const container = document.querySelector('.login-container');
            container.style.animation = 'none';
            container.offsetHeight; /* trigger reflow */
            container.style.animation = 'shake 0.4s ease-in-out';
            
            setTimeout(() => {
                container.style.animation = '';
            }, 400);
        }

        // Add shake animation dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20%, 60% { transform: translateX(-5px); }
                40%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
